<svg width="1600" height="500" xmlns="http://www.w3.org/2000/svg">

<style>
@font-face {
    font-family: "Vectix";
    src: url("../fonts/Vectix.ttf");
}

.title {
    font-family: "Vectix";
    font-size: 120px;
    fill: white;
    letter-spacing: 8px;
}

.subtitle {
    font-family: "JetBrains Mono";
    font-size: 24px;
    fill: #FF3B30;
}

.grid {
    stroke: #202020;
    stroke-width: 1;
}

.line {
    stroke: #FF3B30;
    stroke-width: 3;
}
</style>

<rect width="100%" height="100%" fill="#050505"/>

<g opacity="0.25">

<line class="grid" x1="0" y1="50" x2="1600" y2="50"/>
<line class="grid" x1="0" y1="100" x2="1600" y2="100"/>
<line class="grid" x1="0" y1="150" x2="1600" y2="150"/>
<line class="grid" x1="0" y1="200" x2="1600" y2="200"/>
<line class="grid" x1="0" y1="250" x2="1600" y2="250"/>
<line class="grid" x1="0" y1="300" x2="1600" y2="300"/>
<line class="grid" x1="0" y1="350" x2="1600" y2="350"/>
<line class="grid" x1="0" y1="400" x2="1600" y2="400"/>

</g>

<line class="line" x1="80" y1="120" x2="1520" y2="120"/>

<text class="title" x="100" y="260">
ADARSH
</text>

<text class="title" x="100" y="390">
KOSHY
</text>

<text class="subtitle" x="105" y="450">
CYBERSECURITY • AI SYSTEMS • FULL STACK
</text>

</svg>
